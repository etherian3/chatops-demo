name: Deploy App

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show deploy info
        run: |
          echo "Deploying to ${{ github.event.inputs.env }}"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run app test
        run: node app/app.js & sleep 5

      - name: Notify Slack
        run: echo "Deployment finished for ${{ github.event.inputs.env }}"